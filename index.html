<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Control Clientes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f5f5;padding:20px}
#panel{display:none}
</style>
</head>
<body>

<div class="container">

    <div id="login" class="card p-4 shadow">
        <h3 class="text-center">Ingreso</h3>
        <input type="text" id="user" class="form-control mb-2" placeholder="Usuario">
        <input type="password" id="pass" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-primary w-100" onclick="login()">Ingresar</button>
    </div>

    <div id="panel">
        <h2 class="mb-3">Clientes</h2>

        <div class="card p-3 mb-3 shadow">
            <input type="text" id="nombre" class="form-control mb-2" placeholder="Cliente">
            <input type="text" id="direccion" class="form-control mb-2" placeholder="Dirección">
            <input type="date" id="fecha" class="form-control mb-2">
            <select id="estado" class="form-control mb-2">
                <option>Reparado</option>
                <option>Solo visita</option>
                <option>Pendiente</option>
            </select>
            <button class="btn btn-success" onclick="agregar()">Guardar</button>
        </div>

        <table class="table table-bordered bg-white">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Dirección</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>
</div>

<script>
function login(){
    if(user.value==="admin" && pass.value==="1234"){
        login.style.display="none";
        panel.style.display="block";
        mostrar();
    }
}

function agregar(){
    let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

    clientes.push({
        nombre:nombre.value,
        direccion:direccion.value,
        fecha:fecha.value,
        estado:estado.value
    });

    localStorage.setItem("clientes", JSON.stringify(clientes));

    nombre.value="";
    direccion.value="";
    fecha.value="";

    mostrar();
}

function mostrar(){
    let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
    tabla.innerHTML="";

    clientes.forEach(c=>{
        tabla.innerHTML += `
            <tr>
                <td>${c.nombre}</td>
                <td>${c.direccion}</td>
                <td>${c.fecha}</td>
                <td>${c.estado}</td>
            </tr>
        `;
    });
}
</script>

</body>
</html>

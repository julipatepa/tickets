<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clientes PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }

input, select {
  background:#222 !important;
  color:white !important;
  border:1px solid #555 !important;
}

input::placeholder { color:#aaa !important; }

.card {
  background:#1e1e1e;
  color:white;
  border:none;
}
</style>
</head>

<body class="p-2">

<!-- LOGIN -->
<div id="login">
<h3 class="text-center">Ingreso</h3>

<input id="email" class="form-control mb-2" placeholder="Email">
<input id="pass" type="password" class="form-control mb-2" placeholder="Contraseña">

<button onclick="loginUser()" class="btn btn-primary w-100 mb-2">Entrar</button>
<p id="error" class="text-danger text-center"></p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h3 class="text-center">Clientes</h3>

<button onclick="logout()" class="btn btn-warning mb-2">Cerrar sesión</button>

<select id="filtro" class="form-control mb-2" onchange="cargarDatos()">
<option value="">Todos</option>
<option>Reparado</option>
<option>Visita</option>
<option>Pendiente</option>
</select>

<input id="nombre" class="form-control mb-1" placeholder="Nombre">
<input id="telefono" class="form-control mb-1" placeholder="Teléfono">
<input id="direccion" class="form-control mb-1" placeholder="Dirección">
<input id="fecha" type="date" class="form-control mb-1">

<select id="estado" class="form-control mb-2">
<option>Reparado</option>
<option>Visita</option>
<option>Pendiente</option>
</select>

<button onclick="guardar()" class="btn btn-success w-100 mb-3">Guardar</button>

<div id="lista"></div>

</div>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCAPcfPI7Xem6Ua6uasDws7rfAGn-yUyAs",
  authDomain: "ticketsrowa.firebaseapp.com",
  projectId: "ticketsrowa",
  storageBucket: "ticketsrowa.appspot.com",
  messagingSenderId: "373395832563",
  appId: "1:373395832563:web:0d8cf5099d4e32296e8186"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let editId = null;

// LOGIN
function loginUser(){
auth.signInWithEmailAndPassword(
document.getElementById("email").value,
document.getElementById("pass").value
).catch(e => error.innerText=e.message);
}

// LOGOUT
function logout(){
auth.signOut();
}

// CONTROL SESIÓN
auth.onAuthStateChanged(user=>{
const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");

if(user){
loginDiv.style.display="none";
appDiv.style.display="block";
cargarDatos();
}else{
loginDiv.style.display="block";
appDiv.style.display="none";
}
});

// GUARDAR / EDITAR
function guardar(){

if(!nombre.value || !telefono.value || !direccion.value || !fecha.value){
alert("Completar todo");
return;
}

let data = {
nombre: nombre.value,
telefono: telefono.value,
direccion: direccion.value,
fecha: fecha.value,
estado: estado.value,
usuario: auth.currentUser.email,
fechaCarga: new Date()
};

if(editId){
db.collection("clientes").doc(editId).update(data);
editId=null;
}else{
db.collection("clientes").add(data);
}

limpiar();
}

function limpiar(){
nombre.value="";
telefono.value="";
direccion.value="";
fecha.value="";
}

// EDITAR
function editar(id, c){
editId=id;
nombre.value=c.nombre;
telefono.value=c.telefono;
direccion.value=c.direccion;
fecha.value=c.fecha;
estado.value=c.estado;
}

// ELIMINAR (solo admin)
function eliminar(id){
if(auth.currentUser.email !== "julipatepa@gmail.com"){
alert("Solo admin puede borrar");
return;
}
db.collection("clientes").doc(id).delete();
}

// MOSTRAR
function cargarDatos(){

let filtroEstado = filtro.value;

db.collection("clientes")
.onSnapshot(snapshot => {

lista.innerHTML="";

snapshot.forEach(doc=>{
let c = doc.data();

if(filtroEstado && c.estado !== filtroEstado) return;

lista.innerHTML += `
<div class="card p-2 mb-2">

<b>${c.nombre}</b><br>

<a href="tel:${c.telefono}">📞 ${c.telefono}</a><br>
<a href="https://wa.me/${c.telefono}" target="_blank">💬 WhatsApp</a><br>

<a href="https://www.google.com/maps/search/${c.direccion}" target="_blank">📍 ${c.direccion}</a><br>

📅 ${c.fecha}<br>
👤 ${c.usuario}<br>

<b>${c.estado}</b><br>

<button class="btn btn-info btn-sm mt-1" onclick='editar("${doc.id}", ${JSON.stringify(c)})'>Editar</button>

<button class="btn btn-danger btn-sm mt-1" onclick='eliminar("${doc.id}")'>Eliminar</button>

</div>`;
});
});
}

</script>

</body>
</html>
